# 1.1 PMO 自建 — 业务数据 schema (E2, m2.1, DEC-2026-0005)
# 业务项目自定, PMO 存 + 验证

biz_data_schema:
  version: "1.0"
  defined_by: "biz_project"      # schema 由业务项目定义
  stored_by: "pmo_instance"     # PMO 实例存
  
  # 业务数据实体 (PMO 业务项目内的数据)
  entities:
    - name: "task"
      fields:
        - name: "task_id"
          type: "string"
          required: true
        - name: "title"
          type: "string"
          required: true
        - name: "phase"
          type: "enum"
          values: ["P0-init", "P1-spec", "P2-impl", "P3-test", "P4-deploy", "P5-archive"]
          required: true
        - name: "status"
          type: "enum"
          values: ["pending", "in_progress", "completed", "blocked", "canceled"]
          required: true
        - name: "complexity"
          type: "number"
          required: true
        - name: "created_at"
          type: "datetime"
          required: true
        - name: "completed_at"
          type: "datetime"
          required: false
      primary_key: ["task_id"]
    
    - name: "decision"
      fields:
        - name: "decision_id"
          type: "string"
          required: true
        - name: "task_id"
          type: "string"
          required: true
          foreign_key: "task.task_id"
        - name: "title"
          type: "string"
          required: true
        - name: "decision"
          type: "string"
          required: true
        - name: "decided_at"
          type: "datetime"
          required: true
      primary_key: ["decision_id"]
    
    - name: "metric"
      fields:
        - name: "metric_id"
          type: "string"
          required: true
        - name: "name"
          type: "string"
          required: true
        - name: "value"
          type: "number"
          required: true
        - name: "category"
          type: "enum"
          values: ["business", "governance", "engineering"]
          required: true
        - name: "recorded_at"
          type: "datetime"
          required: true
      primary_key: ["metric_id"]
  
  # 业务事件 (业务流路由用)
  events:
    - name: "task_started"
      entity: "task"
      trigger: "task status change to in_progress"
    - name: "task_completed"
      entity: "task"
      trigger: "task status change to completed"
    - name: "decision_made"
      entity: "decision"
      trigger: "new decision logged"
    - name: "metric_recorded"
      entity: "metric"
      trigger: "new metric value recorded"
