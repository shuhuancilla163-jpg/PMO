# 1.2 量化金融业务项目 — 业务数据 schema (E2, m2.1, DEC-2026-0005)
# 业务项目自定, PMO 存 + 验证

biz_data_schema:
  version: "1.0"
  defined_by: "biz_project"      # schema 由业务项目定义
  stored_by: "pmo_instance"     # PMO 实例存
  
  # 业务数据实体 (量化金融业务项目数据)
  entities:
    - name: "order"
      fields:
        - name: "order_id"
          type: "string"
          required: true
        - name: "symbol"
          type: "string"
          required: true
        - name: "side"
          type: "enum"
          values: ["buy", "sell"]
          required: true
        - name: "quantity"
          type: "number"
          required: true
        - name: "price"
          type: "number"
          required: true
        - name: "status"
          type: "enum"
          values: ["pending", "filled", "canceled", "rejected"]
          required: true
        - name: "created_at"
          type: "datetime"
          required: true
        - name: "filled_at"
          type: "datetime"
          required: false
      primary_key: ["order_id"]
    
    - name: "trade"
      fields:
        - name: "trade_id"
          type: "string"
          required: true
        - name: "order_id"
          type: "string"
          required: true
          foreign_key: "order.order_id"
        - name: "executed_price"
          type: "number"
          required: true
        - name: "executed_quantity"
          type: "number"
          required: true
        - name: "executed_at"
          type: "datetime"
          required: true
      primary_key: ["trade_id"]
    
    - name: "position"
      fields:
        - name: "symbol"
          type: "string"
          required: true
        - name: "quantity"
          type: "number"
          required: true
        - name: "avg_cost"
          type: "number"
          required: true
        - name: "market_value"
          type: "number"
          required: true
        - name: "unrealized_pnl"
          type: "number"
          required: true
        - name: "updated_at"
          type: "datetime"
          required: true
      primary_key: ["symbol"]
    
    - name: "risk_metric"
      fields:
        - name: "metric_id"
          type: "string"
          required: true
        - name: "name"
          type: "enum"
          values: ["var", "drawdown", "leverage", "concentration"]
          required: true
        - name: "value"
          type: "number"
          required: true
        - name: "limit"
          type: "number"
          required: true
        - name: "breached"
          type: "enum"
          values: ["yes", "no"]
          required: true
        - name: "recorded_at"
          type: "datetime"
          required: true
      primary_key: ["metric_id"]
  
  # 业务事件 (业务流路由用)
  events:
    - name: "order_placed"
      entity: "order"
      trigger: "new order"
    - name: "order_filled"
      entity: "trade"
      trigger: "order matched and filled"
    - name: "position_updated"
      entity: "position"
      trigger: "market price change"
    - name: "risk_breached"
      entity: "risk_metric"
      trigger: "risk limit exceeded"
