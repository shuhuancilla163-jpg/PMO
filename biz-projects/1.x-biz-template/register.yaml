# 业务项目注册 (E1, 空模板)
# 具体业务项目创建时, AI Operator 填入具体内容

biz_project:
  id: "<project-id>"              # 具体业务项目 ID (Sponsor 给出)
  name: "<project-name>"          # 具体业务项目名称
  type: "<project-type>"          # 业务类型 (如 finance/ecommerce/health)
  version: "0.1.0"
  sponsor: "Sponsor"
  registered_at: "<YYYY-MM-DD>"  # 具体业务项目创建日期

# 业务项目 PMO 监管 (m2.6 7 项)
pmo_supervision:
  enabled: true
  state: "template"              # template 态, 具体项目创建后改为 active
  quota_4d:
    token: "<token-quota>"       # 具体业务项目填入
    time: "<time-availability>"
    storage: "<storage-quota>"
    concurrency: "<max-concurrency>"
  isolation_3d:
    data: "full"
    config: "independent"
    state: "independent"

# 业务项目内 2 类 agent (DEC-2026-0003)
agent_categories:
  eng_roles:
    description: "5 阶段研发 agent (PMO 监管, 0.0.13)"
    pmo_supervised: true
    location: "eng-roles/"
  biz_agents:
    description: "业务 agent (业务自管, 0.0.14)"
    pmo_supervised: false
    location: "biz-agents/"

# 业务项目 2 层合规 (0.0.11)
compliance_2_layers:
  layer_1_overall: true
  layer_2_eng_5_stages: true

# 业务项目 m2.6 7 项 (业务项目整体)
m2_6_7_items:
  registration: true
  state_machine: true
  quota_4d: true
  archive_4_levels: true
  isolation_3d: true
  alerting_3_levels: true
  checklist_6_plus_3: true
